name: "GATE"
on:
  workflow_dispatch:
    inputs:
      chapter:
        description: 'Chapter'
        required: true
        type: choice
        options:
          - "1 - Engineering Mathematics Important Questions"
          - "2 - General Aptitude Important Questions"

jobs:
  generate-lecture:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout coursevi
        uses: actions/checkout@v4

      - name: Checkout study content
        uses: actions/checkout@v4
        with:
          repository: renj-arch/dimsred
          path: study
          token: ${{ secrets.GH_PAT }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install edge-tts

      - name: Generate animated lecture
        env:
          LLM_PROVIDER: openrouter
          LLM_MODEL: openrouter/free
          LLM_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          STUDY_PROJECT: ${{ github.workspace }}/study
        run: |
          CH="${{ inputs.chapter }}"
          CH_NUM=$(echo "$CH" | cut -d' ' -f1)
          echo "CH_NUM=$CH_NUM" >> $GITHUB_ENV
          python course_video.py gate "$CH_NUM"

      - name: Upload video artifact
        uses: actions/upload-artifact@v4
        with:
          name: animated-lecture-gate-${{ inputs.chapter }}
          path: output/*.mp4
          retention-days: 7