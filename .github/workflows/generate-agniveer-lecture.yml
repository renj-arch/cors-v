name: "Agniveer"
on:
  workflow_dispatch:
    inputs:
      chapter:
        description: 'Chapter'
        required: true
        type: choice
        options:
          - "Analogies - Verbal and Non-verbal"
          - "Number Series, Letter Series & Alpha-Numeric Series"
          - "Classification and Odd One Out"
          - "Coding-Decoding"
          - "Blood Relations and Family Trees"
          - "Syllogisms and Statements"
          - "Agniveer GK Important Questions with Answers"
          - "Agniveer Mathematics Important Questions"
          - "Agniveer Reasoning Important Questions with Answers"
          - "Agniveer Science Important Questions with Answers"
      parts:
        description: 'Split into how many parts?'
        required: true
        type: number
        default: 1

jobs:
  generate-lecture:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout coursevi
        uses: actions/checkout@v4

      - name: Checkout study content
        uses: actions/checkout@v4
        with:
          repository: renj-arch/dimsred
          path: study
          token: ${{ secrets.GH_PAT }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install edge-tts

      - name: Generate animated lecture
        env:
          LLM_PROVIDER: openrouter
          LLM_MODEL: openrouter/free
          LLM_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          STUDY_PROJECT: ${{ github.workspace }}/study
          PARTS: ${{ inputs.parts }}
        run: python course_video.py agniveer "${{ inputs.chapter }}"

      - name: Upload video artifact
        uses: actions/upload-artifact@v4
        with:
          name: animated-lecture-agniveer-${{ inputs.chapter }}
          path: output/*.mp4
          retention-days: 7
